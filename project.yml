name: MagicActions
options:
  bundleIdPrefix: local.elidev
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

packages:
  PermissionFlow:
    path: Vendor/PermissionFlow

targets:
  MagicActions:
    type: application
    platform: macOS
    sources:
      - path: Sources/MagicActions
      - path: icon/MagicActions.icon
      - path: Resources/Assets.xcassets
      - path: Resources/Scripts
        type: folder
      - path: Resources/Templates
        type: folder
    dependencies:
      - target: MagicActionsFinderSync
        embed: true
        codeSign: true
      - package: PermissionFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.elidev.MagicActions
        PRODUCT_NAME: MagicActions
        MARKETING_VERSION: 0.2.2
        CURRENT_PROJECT_VERSION: 0.2.2
        INFOPLIST_FILE: Supporting/MagicActions-Info.plist
        INFOPLIST_KEY_LSUIElement: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: MagicActions
        CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5Q5QT76MJU
    scheme:
      testTargets: []

  MagicActionsFinderSync:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/MagicActionsFinderSync
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.elidev.MagicActions.FinderSync
        PRODUCT_NAME: MagicActionsFinderSync
        MARKETING_VERSION: 0.2.2
        CURRENT_PROJECT_VERSION: 0.2.2
        INFOPLIST_FILE: Supporting/MagicActionsFinderSync-Info.plist
        CODE_SIGN_ENTITLEMENTS: Supporting/MagicActionsFinderSync.entitlements
        CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5Q5QT76MJU
